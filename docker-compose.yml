# ==========================================
# Docker Compose 設定檔案
# ==========================================
# 這個檔案定義了多個伺務的設定，使用 docker-compose 可以一次啟動所有伺務

services:
  # ========== PostgreSQL 數據庫伺務 ==========
  postgres:
    image: postgres:15
    container_name: auth_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-auth_db}
      POSTGRES_USER: ${DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-auth_password_123}
    # PostgreSQL 容器內監聽標準 port 5432，映射到外部 9090
    ports:
      - "9090:5432"
    command: postgres -c port=5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d auth_db -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========== MinIO 對象存儲伺務 ==========
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # MinIO API 端口
      - "9001:9001" # MinIO 管理控制台端口
    environment:
      # 從 .env 檔案讀取，如果沒有則使用預設值
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}

      # 啟用跨域資源共享 (CORS)，允許前端訪問圖片
      MINIO_BROWSER_REDIRECT_URL: http://35.201.135.229:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data # 持久化數據
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Django 後端伺務 ==========
  backend:
    build: .
    container_name: django-backend
    ports:
      - "30000:30000" # API 端口
    env_file:
      - .env # 從 .env 檔案讀取所有環境變數設定
    volumes:
      # 掛載程式碼目錄以支援 hot reload（開發模式）
      - ./accounts:/app/accounts
      - ./config:/app/config
      - ./picture:/app/picture
      - ./combine:/app/combine
      - ./aichat_service:/app/aichat_service
      - ./manage.py:/app/manage.py
      - ./start.sh:/app/start.sh
      # 日誌目錄
      - ./logs:/app/logs
    # 使用 start.sh 作為啟動命令
    # 在容器內自動偵測為 container 模式：等待 DB → migrate → 建立 admin → 啟動伺務
    command: [ "/app/start.sh" ]
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

# ========== 網絡設定 ==========
networks:
  app-network:
    driver: bridge

# ========== 數據卷設定 ==========
volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
