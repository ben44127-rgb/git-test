# ==========================================
# Docker Compose 配置檔案
# ==========================================
# 這個檔案定義了多個服務的配置，使用 docker-compose 可以一次啟動所有服務

version: '3.8'

services:
  # ========== MinIO 對象存儲服務 ==========
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # MinIO API 端口
      - "9001:9001" # MinIO 管理控制台端口
    environment:
      # 從 .env 檔案讀取，如果沒有則使用預設值
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      
      # 啟用跨域資源共享 (CORS)，允許前端訪問圖片
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data # 持久化數據
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Django 後端服務 ==========
  backend:
    build: .
    container_name: django-backend
    ports:
      - "30000:30000" # API 端口
    env_file:
      - .env # 載入 .env 檔案中的所有環境變數
    environment:
      # MinIO 配置（Docker 內部使用服務名稱）
      # 這裡會覆蓋 .env 中的 MINIO_ENDPOINT，因為在 Docker 網路中需要使用服務名稱
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-processed-images}
      MINIO_SECURE: "False"
      
      # MinIO 外部訪問地址（前端瀏覽器用這個 URL 訪問圖片）
      # 根據運行環境自行修改：localhost:9000 (本地) 或 192.168.233.128:9000 (Lan IP)
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://192.168.233.128:9000}

      # AI 後端配置
      # 如果 AI 服務也在 Docker 中，使用服務名稱
      # 如果在宿主機上，使用 host.docker.internal (Mac/Windows) 或 172.17.0.1 (Linux)
      AI_BACKEND_URL: ${AI_BACKEND_URL:-http://host.docker.internal:8002/api/remove_bg}

      # Django 配置
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-this-secret-key-in-production}

      # 開發模式配置（啟用 hot reload）
      # 設為 true 時使用 Django runserver 並掛載程式碼目錄
      # 設為 false 時使用 Gunicorn 生產伺服器
      DJANGO_DEV_MODE: ${DJANGO_DEV_MODE:-false}
    volumes:
      # 掛載程式碼目錄以支援 hot reload（開發模式）
      - ./api:/app/api
      - ./config:/app/config
      - ./manage.py:/app/manage.py
      # 日誌目錄
      - ./logs:/app/logs
    # 根據 DJANGO_DEV_MODE 環境變數決定啟動命令
    # 開發模式：使用 Django runserver（支援 hot reload）
    # 生產模式：使用 Dockerfile 中的預設命令（Gunicorn）
    command: >
      sh -c "
        if [ \"$$DJANGO_DEV_MODE\" = \"true\" ]; then
          echo '🔧 開發模式：Hot Reload 已啟用';
          echo '⏳ 等待 MinIO 服務...';
          sleep 5;
          echo '🔄 運行數據庫遷移...';
          python3 manage.py migrate --noinput;
          echo '🚀 啟動 Django 開發伺服器...';
          python3 manage.py runserver 0.0.0.0:30000;
        else
          echo '🚀 生產模式：使用 Gunicorn';
          echo '⏳ 等待 MinIO 服務...';
          sleep 5;
          echo '🔄 運行數據庫遷移...';
          python3 manage.py migrate --noinput;
          echo '✅ 啟動 Gunicorn 伺服器...';
          gunicorn config.wsgi:application --bind 0.0.0.0:30000 --workers 4 --timeout 300;
        fi
      "
    depends_on:
      - minio
    networks:
      - app-network
    restart: unless-stopped

# ========== 網絡配置 ==========
networks:
  app-network:
    driver: bridge

# ========== 數據卷配置 ==========
volumes:
  minio_data:
    driver: local
